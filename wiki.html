    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F7F5F0; color: #3D443B; }
        h1, h2, h3, h4, .serif-font { font-family: 'Noto Serif TC', serif; }
        [id] { scroll-margin-top: 100px; }

        .bg-dots-pattern { background-color: #F7F5F0; }
        .bg-dots-pattern::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#465B40 0.5px, transparent 0.5px);
            background-size: 12px 12px; opacity: 0.06; pointer-events: none;
        }

        /* Hero 背景 */
        .wiki-hero-bg {
            background-image: url('/HuaFan/image/index/花.webp');
            background-size: cover;
            background-position: center 35%;
            position: relative;
        }
        .text-shadow-lg { text-shadow: 0 4px 8px rgba(0,0,0,0.3); }

        /* 釘選目錄卡（沿用原目錄樣式） */
        .wiki-toc-link { transition: all .25s ease; border-left: 2px solid transparent; }
        .wiki-toc-link:hover, .wiki-toc-link.active { border-left-color: #C5A670; color: #465B40; background: rgba(197,166,112,.08); }

        /* 知識圖卡（仿尖端洞察卡片，套用華梵色彩） */
        .wiki-card-item {
            position: relative; display: flex; flex-direction: column;
            background: #FFFEFA;
            border: 1px solid rgba(255,255,255,.9);
            border-radius: 1.5rem; overflow: hidden;
            box-shadow: 0 10px 40px -10px rgba(70, 91, 64, 0.1);
            transition: transform 0.35s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.35s, border-color 0.35s;
            text-decoration: none; color: inherit;
        }
        .wiki-card-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 50px -18px rgba(70,91,64,.35);
            border-color: rgba(197,166,112,.5);
        }
        .wiki-cover {
            aspect-ratio: 16 / 10; overflow: hidden; background: #E3EBE5; position: relative;
        }
        .wiki-cover img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.7s ease;
        }
        .wiki-card-item:hover .wiki-cover img { transform: scale(1.05); }
        .wiki-body {
            padding: 1.3rem 1.4rem 1.4rem;
            display: flex; flex-direction: column; gap: 0.7rem; flex: 1;
        }
        .wiki-meta {
            display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap;
            font-size: 0.7rem; font-weight: 700;
            color: #8B9287; letter-spacing: 0.05em;
        }
        .wiki-no {
            font-weight: 700; letter-spacing: 0.15em; padding: 0.18rem 0.55rem;
            border-radius: 999px; background: rgba(70,91,64,0.08); color: #465B40;
        }
        .wiki-cat { display: inline-flex; align-items: center; gap: 0.25rem; color: #465B40; }
        .wiki-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.15rem; font-weight: 700; color: #2F3E2B;
            line-height: 1.45; letter-spacing: 0.01em;
            display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .wiki-card-item:hover .wiki-title { color: #465B40; }
        .wiki-summary {
            font-size: 0.85rem; color: #6b7280; line-height: 1.75;
            display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .wiki-cta {
            margin-top: auto; padding-top: 0.75rem;
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.78rem; font-weight: 700; color: #C5A670;
            letter-spacing: 0.15em;
            border-top: 1px dashed rgba(197,166,112,.5);
            transition: gap 0.2s ease, color 0.2s ease;
        }
        .wiki-card-item:hover .wiki-cta { gap: 0.75rem; color: #465B40; }
        .wiki-badge {
            position: absolute; top: 0.65rem; left: 0.7rem;
            padding: 0.22rem 0.6rem; border-radius: 999px;
            color: #fff; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em;
            backdrop-filter: blur(6px); z-index: 2;
        }
        .wiki-badge-pinned { background: rgba(70,91,64,0.88); }
        .wiki-badge-featured { background: rgba(197,166,112,0.92); color: #2F3E2B; right: 0.7rem; left: auto; }

        /* 分類 chips */
        .cat-chip {
            display: inline-flex; align-items: center;
            padding: 0.45rem 1rem; border-radius: 999px;
            border: 1px solid #d1d5db; background: #fff;
            font-size: 0.8rem; font-weight: 500; letter-spacing: 0.05em;
            color: #4b5563; cursor: pointer; user-select: none;
            transition: all 0.25s ease;
        }
        .cat-chip:hover { border-color: #465B40; color: #465B40; }
        .cat-chip.active { background: #465B40; color: #fff; border-color: #465B40; }

        /* 分頁 */
        .pager-btn {
            min-width: 2.4rem; height: 2.4rem;
            padding: 0 0.75rem; border-radius: 999px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em;
            border: 1px solid #d1d5db;
            background: #fff; color: #465B40;
            transition: all 0.2s ease; cursor: pointer;
        }
        .pager-btn:hover { border-color: #465B40; }
        .pager-btn.active { background: #465B40; color: #fff; border-color: #465B40; }
        .pager-btn[disabled] { opacity: 0.35; cursor: not-allowed; }

        @media (prefers-reduced-motion: reduce) {
            .wiki-toc-link, .wiki-card-item, .wiki-cover img, .cat-chip { transition: none !important; }
        }

    <!-- 共用元件（由 js/hf-components.js 注入）：Footer 頁尾（含頁尾前螢幕網屏緩衝帶） -->

    <script>
    (function initWikiPage() {
        'use strict';

        /* 舊版錨點相容：wiki.html#etiquette 等 → 導向對應釘選文章頁 */
        (function legacyHashRedirect() {
            var hash = (location.hash || '').replace('#', '');
            if (!hash) return;
            var post = WikiStore.getById(hash);
            if (post && post.pinned) {
                location.replace(WikiStore.detailUrlOf(post));
            }
        })();

        var grid = document.getElementById('wiki-grid');
        var empty = document.getElementById('wiki-empty');
        var pager = document.getElementById('wiki-pager');
        var catsEl = document.getElementById('wiki-cats');
        var pinnedNavEl = document.getElementById('wiki-pinned-nav');
        var PAGE_SIZE = 12;

        var currentPage = 1;
        var activeCat = 'all';

        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function renderPinnedNav() {
            pinnedNavEl.innerHTML = WikiStore.renderPinnedNavHTML({ showBack: false });
        }

        function renderCats() {
            var all = WikiStore.getAll();
            var counts = new Map();
            counts.set('all', all.length);
            all.forEach(function (p) {
                (p.categories || []).forEach(function (c) {
                    counts.set(c, (counts.get(c) || 0) + 1);
                });
            });
            var cats = Array.from(counts.entries()).filter(function (e) { return e[0] === 'all' || e[1] > 0; });
            catsEl.innerHTML = cats.map(function (entry) {
                var cat = entry[0], n = entry[1];
                var label = cat === 'all' ? '全部知識' : cat;
                var active = cat === activeCat ? 'active' : '';
                return '<button type="button" class="cat-chip ' + active + '" data-cat="' + esc(cat) + '" role="tab" aria-selected="' + (cat === activeCat) + '">' +
                    esc(label) + ' <span class="ml-1.5 text-[10px] opacity-70">' + n + '</span></button>';
            }).join('');
            catsEl.querySelectorAll('[data-cat]').forEach(function (el) {
                el.addEventListener('click', function () {
                    activeCat = el.getAttribute('data-cat');
                    currentPage = 1;
                    renderCats();
                    renderGrid();
                });
            });
        }

        function filterList() {
            var all = WikiStore.getAll();
            if (activeCat === 'all') return all;
            return all.filter(function (p) { return (p.categories || []).includes(activeCat); });
        }

        function renderGrid() {
            var list = filterList();
            grid.innerHTML = '';
            pager.innerHTML = '';

            if (!list.length) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            var totalPages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;
            var startIdx = (currentPage - 1) * PAGE_SIZE;
            var pageItems = list.slice(startIdx, startIdx + PAGE_SIZE);

            grid.innerHTML = pageItems.map(function (p, i) {
                var cover = WikiStore.coverOf(p);
                var summary = WikiStore.summaryOf(p, 110);
                var cat = (p.categories && p.categories[0]) || '';
                var num = String(startIdx + i + 1).padStart(2, '0');
                return '' +
                    '<a href="' + esc(WikiStore.detailUrlOf(p)) + '" class="wiki-card-item">' +
                        (p.pinned ? '<span class="wiki-badge wiki-badge-pinned"><i class="fa-solid fa-thumbtack mr-1"></i>釘選</span>' : '') +
                        (p.featured ? '<span class="wiki-badge wiki-badge-featured"><i class="fa-solid fa-star mr-1"></i>精選</span>' : '') +
                        '<div class="wiki-cover">' +
                            '<img src="' + esc(cover) + '" alt="' + esc(p.title) + '" loading="lazy" ' +
                                 'onerror="this.src=\'' + esc(WikiStore.pickFallbackCover(p.id)) + '\';">' +
                        '</div>' +
                        '<div class="wiki-body">' +
                            '<div class="wiki-meta">' +
                                '<span class="wiki-no">No.' + num + '</span>' +
                                (p.publishedDate ? '<span><i class="fa-regular fa-calendar mr-1"></i>' + esc(p.publishedDate) + '</span>' : '') +
                                (cat ? '<span class="wiki-cat"><i class="fa-solid fa-tag text-[9px]"></i>' + esc(cat) + '</span>' : '') +
                            '</div>' +
                            '<h3 class="wiki-title">' + esc(p.title) + '</h3>' +
                            (summary ? '<p class="wiki-summary">' + esc(summary) + '</p>' : '') +
                            '<span class="wiki-cta">閱讀全文 <i class="fa-solid fa-arrow-right-long text-xs"></i></span>' +
                        '</div>' +
                    '</a>';
            }).join('');

            renderPager(totalPages);
        }

        function renderPager(totalPages) {
            if (totalPages <= 1) { pager.innerHTML = ''; return; }
            function mk(label, page, opts) {
                opts = opts || {};
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'pager-btn' + (opts.active ? ' active' : '');
                btn.textContent = label;
                if (opts.disabled) btn.disabled = true;
                if (!opts.disabled && !opts.active) {
                    btn.addEventListener('click', function () {
                        currentPage = page;
                        renderGrid();
                        var sec = document.getElementById('wiki-grid-section');
                        if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    });
                }
                return btn;
            }
            function mkEllipsis() {
                var s = document.createElement('span');
                s.textContent = '…';
                s.className = 'px-1 text-gray-400';
                return s;
            }
            pager.innerHTML = '';
            pager.appendChild(mk('«', currentPage - 1, { disabled: currentPage === 1 }));
            var set = new Set([1, totalPages, currentPage, currentPage - 1, currentPage + 1, currentPage - 2, currentPage + 2]);
            var arr = Array.from(set).filter(function (p) { return p >= 1 && p <= totalPages; }).sort(function (a, b) { return a - b; });
            var prev = 0;
            arr.forEach(function (p) {
                if (p - prev > 1) pager.appendChild(mkEllipsis());
                pager.appendChild(mk(String(p), p, { active: p === currentPage }));
                prev = p;
            });
            pager.appendChild(mk('»', currentPage + 1, { disabled: currentPage === totalPages }));
        }

        function refreshAll() {
            renderPinnedNav();
            renderCats();
            renderGrid();
        }

        refreshAll();
        WikiStore.subscribe(refreshAll);

        // 部署後拉遠端 JSON 覆蓋
        WikiStore.refreshFromRemote().then(function (ok) { if (ok) refreshAll(); });
    })();
    </script>
    <script src="js/hf-wiki-admin.js"></script>
