<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 共用：本機 / 部署 圖片路徑自動切換（需以相對路徑載入） -->
    <script src="js/hf-image-path.js"></script>
    <!-- 共用：Header / 漢堡選單 / 右側懸浮鈕 / Footer 版型元件 -->
    <script src="js/hf-components.js"></script>
    <!-- 最新消息資料層 -->
    <script src="js/hf-news-store.js"></script>
    <title>載入中…｜華梵禮儀 最新消息</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/hf-header-menu.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#465B40',
                        primaryDark: '#2F3E2B',
                        secondary: '#2F3E2B',
                        accent: '#C5A670',
                        warm: '#F7F5F0',
                        pale: '#E3EBE5',
                        surface: '#FFFEFA',
                        emergency: '#9F4A46',
                        text: '#3D443B',
                        menu: '#E5E7EB',
                    },
                    fontFamily: {
                        serif: ['"Noto Serif TC"', 'serif'],
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(70, 91, 64, 0.1)',
                        'card': '0 20px 40px -15px rgba(70, 91, 64, 0.25)',
                        'red-glow': '0 4px 15px rgba(159, 74, 70, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F7F5F0; color: #3D443B; }
        h1, h2, h3, h4, .serif-font { font-family: 'Noto Serif TC', serif; }
        [id] { scroll-margin-top: 100px; }

        .bg-dots-pattern { background-color: #F7F5F0; }
        .bg-dots-pattern::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#465B40 0.5px, transparent 0.5px);
            background-size: 12px 12px; opacity: 0.06; pointer-events: none;
        }

        /* 文章 Hero */
        .article-hero { position: relative; background: #2F3E2B; overflow: hidden; }
        .article-hero-img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; opacity: 0.5;
        }
        .article-hero-fade {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(47,62,43,0.25) 0%, rgba(47,62,43,0.6) 55%, rgba(47,62,43,0.92) 100%);
        }
        .text-shadow-lg { text-shadow: 0 4px 8px rgba(0,0,0,0.3); }

        /* 文章內文（仿尖端洞察詳細頁，套用華梵色彩） */
        .article-body { max-width: 44rem; margin: 0 auto; }
        .article-body p {
            font-size: 1.05rem; line-height: 2;
            color: #3D443B; margin: 1.4rem 0;
        }
        .article-body p strong { color: #2F3E2B; font-weight: 700; }
        .article-body h2 {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.8rem; font-weight: 700;
            color: #2F3E2B; margin: 3rem 0 1.2rem;
            line-height: 1.35; letter-spacing: 0.01em;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(197,166,112,.45);
        }
        .article-body h3 {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.35rem; font-weight: 700;
            color: #465B40; margin: 2.4rem 0 0.9rem;
            line-height: 1.4;
        }
        .article-body figure { margin: 2.4rem -1rem; }
        @media (min-width: 768px) {
            .article-body figure { margin: 3rem -3rem; }
        }
        .article-body figure img {
            width: 100%; height: auto; display: block;
            border-radius: 1rem;
            box-shadow: 0 20px 40px -15px rgba(70,91,64,0.35);
        }
        /* 縮圖：最長邊約為大圖最長邊的 1/3 */
        .article-body figure.is-small { margin: 2rem auto; max-width: 33%; }
        @media (min-width: 768px) {
            .article-body figure.is-small { margin: 2.4rem auto; max-width: 33%; }
        }
        .article-body figure.is-small img {
            border-radius: 0.5rem;
            box-shadow: 0 10px 24px -14px rgba(70,91,64,0.3);
        }
        @media (max-width: 540px) {
            .article-body figure.is-small { max-width: 55%; }
        }
        .article-body .thumb-strip {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1.25rem;
            margin: 2rem 0;
            align-items: start;
        }
        .article-body .thumb-strip figure.is-small { margin: 0; max-width: 100%; }
        .article-body .thumb-strip figure.is-small img {
            width: 100%; aspect-ratio: 1; object-fit: cover;
        }
        @media (max-width: 900px) {
            .article-body .thumb-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 540px) {
            .article-body .thumb-strip { grid-template-columns: 1fr; }
            .article-body .thumb-strip figure.is-small { max-width: 55%; margin: 0 auto; }
        }
        .article-body figcaption {
            margin-top: 0.9rem;
            font-size: 0.85rem;
            color: #8B9287;
            text-align: center;
            line-height: 1.7;
        }
        .article-body blockquote {
            margin: 2.4rem 0;
            padding: 1.2rem 1.6rem;
            border-left: 3px solid #C5A670;
            background: rgba(197,166,112,0.08);
            border-radius: 0 1rem 1rem 0;
        }
        .article-body blockquote p {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.2rem; font-weight: 500;
            line-height: 1.8; color: #2F3E2B;
            margin: 0;
        }
        .article-body blockquote cite {
            display: block; margin-top: 0.75rem;
            font-size: 0.8rem; color: #8B9287;
            font-style: normal; letter-spacing: 0.08em;
        }
        .article-body blockquote cite::before { content: "— "; color: #C5A670; }
        .article-body hr {
            margin: 3rem auto; width: 4rem;
            border: 0; border-top: 1px solid #C5A670;
        }

        /* 相關消息卡 */
        .related-card {
            display: block;
            background: #FFFEFA;
            border: 1px solid rgba(255,255,255,.9);
            border-radius: 1.25rem; overflow: hidden;
            box-shadow: 0 10px 40px -10px rgba(70, 91, 64, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            text-decoration: none; color: inherit;
        }
        .related-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -15px rgba(70,91,64,.3);
            border-color: rgba(197,166,112,.5);
        }
        .related-cover { aspect-ratio: 16/10; background: #E3EBE5; overflow: hidden; }
        .related-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .related-card:hover .related-cover img { transform: scale(1.04); }

        @media (prefers-reduced-motion: reduce) {
            .related-card, .related-cover img { transition: none !important; }
        }
    </style>
</head>
<body class="antialiased">

    <!-- 共用元件（由 js/hf-components.js 注入） -->
    <div id="hf-floating"></div>
    <div id="hf-menu"></div>
    <div id="hf-header"></div>

    <!-- ===== 讀取中 / 找不到消息 ===== -->
    <section id="article-fallback" class="hidden px-4 md:px-6 pt-48 pb-32">
        <div class="max-w-3xl mx-auto text-center">
            <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-surface border border-white shadow-soft flex items-center justify-center">
                <i class="fa-regular fa-file-lines text-3xl text-accent"></i>
            </div>
            <h1 class="font-serif text-3xl md:text-4xl font-bold text-primaryDark mb-4">找不到這則消息</h1>
            <p class="text-gray-500 leading-loose mb-10">
                這則消息可能已被移除，或連結不正確。<br>
                你可以回到「最新消息」繼續瀏覽其他動態。
            </p>
            <a href="news.html" class="inline-flex items-center gap-3 px-8 py-3 rounded-full bg-primary text-white text-sm tracking-widest font-bold hover:bg-primaryDark transition-all">
                <i class="fa-solid fa-arrow-left-long text-xs"></i> 返回最新消息
            </a>
        </div>
    </section>

    <!-- ===== 消息 Hero + 波浪 ===== -->
    <header id="article-hero" class="article-hero pt-40 pb-28 md:pt-48 md:pb-36 px-4 md:px-6 text-white hidden">
        <img id="article-hero-img" class="article-hero-img" alt="">
        <div class="article-hero-fade"></div>
        <div class="max-w-4xl mx-auto relative z-10">
            <a href="news.html" class="inline-flex items-center gap-2 text-xs md:text-sm tracking-widest text-white/70 hover:text-white mb-8 transition-colors">
                <i class="fa-solid fa-arrow-left-long"></i> 最新消息 · Latest News
            </a>
            <div id="article-cats" class="flex flex-wrap gap-2 mb-6 text-[10px] font-bold tracking-[0.2em] uppercase text-white/85"></div>
            <h1 id="article-title" class="font-serif text-3xl md:text-5xl font-bold leading-tight mb-4 text-shadow-lg"></h1>
            <p id="article-subtitle" class="text-base md:text-xl text-white/85 leading-relaxed mb-8 max-w-3xl"></p>
            <div class="flex flex-wrap items-center gap-x-6 gap-y-3 text-sm text-white/70">
                <span id="article-date" class="flex items-center gap-2"><i class="fa-regular fa-calendar text-xs"></i><span></span></span>
            </div>
        </div>
        <!-- 波浪分隔線 -->
        <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-[0] z-20 translate-y-[1px]">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none" class="relative block w-[calc(100%+1.3px)] h-[50px] md:h-[90px]">
                <path d="M985.66,92.83C906.67,72,823.78,31,744.38,13.78c-82.26-17.34-168.06-16.33-250.45.39-57.84,11.73-114,31.07-172,41.86A600.21,600.21,0,0,1,0,27.35V120H1200V95.8C1132.19,118.92,1055.71,111.31,985.66,92.83Z" class="fill-[#F7F5F0]"></path>
            </svg>
        </div>
    </header>

    <!-- ===== 消息內文 ===== -->
    <main id="article-main" class="px-4 md:px-6 py-12 md:py-16 hidden">
        <article id="article-body" class="article-body"></article>

        <!-- 外部報導連結 -->
        <div id="article-external" class="max-w-2xl mx-auto mt-10 hidden">
            <a id="article-external-link" href="#" target="_blank" rel="noopener"
               class="inline-flex items-center gap-3 px-6 py-3 rounded-full border border-accent/50 bg-accent/10 text-primary font-bold hover:bg-primary hover:text-white hover:border-primary transition-all">
                <i class="fa-solid fa-newspaper"></i> 相關報導連結
                <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
            </a>
        </div>

        <!-- 標籤 / 分享 / 返回 -->
        <div class="max-w-2xl mx-auto mt-14 pt-8 border-t border-accent/30">
            <div id="article-tags" class="flex flex-wrap gap-2 mb-8"></div>
            <div class="flex flex-wrap items-center justify-between gap-4">
                <a href="news.html" class="inline-flex items-center gap-3 text-sm font-bold tracking-widest text-primary hover:text-accent transition-colors">
                    <i class="fa-solid fa-arrow-left-long"></i> 返回最新消息
                </a>
                <div class="flex items-center gap-2">
                    <a href="tel:0800800818" class="hidden sm:inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-emergency text-white text-sm font-bold shadow-red-glow hover:opacity-90 transition">
                        <i class="fa-solid fa-phone-volume"></i> 24H 免費諮詢
                    </a>
                    <button id="share-link" class="w-10 h-10 rounded-full border border-gray-300 bg-white flex items-center justify-center hover:bg-primary hover:text-white hover:border-primary transition-all" title="複製消息連結">
                        <i class="fa-solid fa-link text-xs"></i>
                    </button>
                    <a id="share-fb" target="_blank" rel="noopener" class="w-10 h-10 rounded-full border border-gray-300 bg-white flex items-center justify-center hover:bg-primary hover:text-white hover:border-primary transition-all" title="分享到 Facebook">
                        <i class="fa-brands fa-facebook-f text-xs"></i>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- ===== 相關消息 ===== -->
    <section id="article-related" class="px-4 md:px-6 pb-60 md:pb-96 hidden">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center gap-4 mb-10">
                <span class="w-8 h-[2px] bg-accent inline-block"></span>
                <p class="text-xs font-bold tracking-[0.3em] text-accent uppercase">延伸閱讀 More News</p>
            </div>
            <div id="related-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>
    </section>

    <!-- 共用元件（由 js/hf-components.js 注入）：Footer 頁尾（含頁尾前螢幕網屏緩衝帶） -->
    <div id="hf-footer"></div>
    <div id="hf-sticky-footer"></div>

    <script>
    (function initDetail() {
        'use strict';

        var fallbackEl = document.getElementById('article-fallback');
        var heroEl = document.getElementById('article-hero');
        var mainEl = document.getElementById('article-main');
        var relatedEl = document.getElementById('article-related');

        // ?id=xxx 為主；#xxx 為後援（供舊錨點連結與部分預覽環境使用）
        function currentId() {
            var params = new URLSearchParams(location.search);
            return params.get('id') || (location.hash || '').replace('#', '');
        }

        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function renderBlocks(blocks) {
            if (!blocks || !blocks.length) return '<p class="text-gray-500">（尚無內文）</p>';
            var out = [];
            var smallRun = [];

            function renderImageFigure(b) {
                if (!b || !b.src) return '';
                var sizeCls = b.size === 'small' ? ' class="is-small"' : '';
                return '<figure' + sizeCls + '>' +
                    '<img src="' + esc(b.src) + '" alt="' + esc(b.alt || b.caption || '') + '" loading="lazy">' +
                    (b.caption ? '<figcaption>' + esc(b.caption) + '</figcaption>' : '') +
                '</figure>';
            }

            function flushSmallRun() {
                if (!smallRun.length) return;
                if (smallRun.length === 1) {
                    out.push(renderImageFigure(smallRun[0]));
                } else {
                    out.push('<div class="thumb-strip">' + smallRun.map(renderImageFigure).join('') + '</div>');
                }
                smallRun = [];
            }

            blocks.forEach(function (b) {
                if (!b || !b.type) return;
                if (b.type === 'heading') {
                    flushSmallRun();
                    var level = b.level === 3 ? 3 : 2;
                    out.push('<h' + level + '>' + esc(b.text || '') + '</h' + level + '>');
                    return;
                }
                if (b.type === 'paragraph') {
                    flushSmallRun();
                    var paras = String(b.text || '').split(/\n{2,}/).filter(Boolean);
                    out.push(paras.map(function (p) {
                        return '<p>' + esc(p).replace(/\n/g, '<br>') + '</p>';
                    }).join(''));
                    return;
                }
                if (b.type === 'quote') {
                    flushSmallRun();
                    out.push('<blockquote><p>' + esc(b.text || '') + '</p>' +
                        (b.cite ? '<cite>' + esc(b.cite) + '</cite>' : '') + '</blockquote>');
                    return;
                }
                if (b.type === 'image') {
                    if (!b.src) return;
                    if (b.size === 'small') {
                        smallRun.push(b);
                    } else {
                        flushSmallRun();
                        out.push(renderImageFigure(b));
                    }
                    return;
                }
                if (b.type === 'divider') {
                    flushSmallRun();
                    out.push('<hr>');
                }
            });

            flushSmallRun();
            return out.join('');
        }

        function renderRelated(current) {
            var grid = document.getElementById('related-grid');
            var all = NewsStore.getAll().filter(function (x) { return x.id !== current.id; });
            var curCats = new Set(current.categories || []);
            var scored = all.map(function (p) {
                var overlap = (p.categories || []).filter(function (c) { return curCats.has(c); }).length;
                return { p: p, score: overlap };
            }).sort(function (a, b) { return b.score - a.score; });
            var picks = scored.slice(0, 3).map(function (x) { return x.p; });
            if (!picks.length) { relatedEl.classList.add('hidden'); return; }
            relatedEl.classList.remove('hidden');
            grid.innerHTML = picks.map(function (p) {
                var cover = NewsStore.coverOf(p);
                return '' +
                    '<a href="' + esc(NewsStore.detailUrlOf(p)) + '" class="related-card">' +
                        '<div class="related-cover">' +
                            '<img src="' + esc(cover) + '" alt="' + esc(p.title) + '" loading="lazy" ' +
                                 'onerror="this.src=\'' + esc(NewsStore.pickFallbackCover(p.id)) + '\';">' +
                        '</div>' +
                        '<div class="p-5">' +
                            '<p class="text-[10px] font-bold tracking-[0.2em] text-accent uppercase mb-2">' +
                                esc(p.publishedDate || '') + (p.categories && p.categories[0] ? ' · ' + esc(p.categories[0]) : '') +
                            '</p>' +
                            '<h3 class="font-serif text-lg font-bold text-primaryDark leading-snug line-clamp-2">' + esc(p.title) + '</h3>' +
                        '</div>' +
                    '</a>';
            }).join('');
        }

        function renderPost(post) {
            document.title = post.title + '｜華梵禮儀 最新消息';

            var cover = NewsStore.coverOf(post);
            var imgEl = document.getElementById('article-hero-img');
            imgEl.src = cover;
            imgEl.alt = post.title;
            imgEl.onerror = function () { imgEl.src = NewsStore.pickFallbackCover(post.id); };

            document.getElementById('article-cats').innerHTML = (post.categories || []).map(function (c) {
                return '<span class="px-2.5 py-1 rounded-full bg-white/15 border border-white/25 backdrop-blur">' + esc(c) + '</span>';
            }).join('');

            document.getElementById('article-title').textContent = post.title;
            var subEl = document.getElementById('article-subtitle');
            if (post.subtitle) { subEl.textContent = post.subtitle; subEl.classList.remove('hidden'); }
            else { subEl.classList.add('hidden'); }

            var dateSpan = document.querySelector('#article-date span');
            if (post.publishedDate) {
                dateSpan.textContent = post.publishedDate;
                document.getElementById('article-date').classList.remove('hidden');
            } else {
                document.getElementById('article-date').classList.add('hidden');
            }

            document.getElementById('article-body').innerHTML = renderBlocks(post.blocks);

            // 外部報導連結
            var extWrap = document.getElementById('article-external');
            if (post.external) {
                document.getElementById('article-external-link').href = post.external;
                extWrap.classList.remove('hidden');
            } else {
                extWrap.classList.add('hidden');
            }

            document.getElementById('article-tags').innerHTML = (post.tags || []).map(function (t) {
                return '<span class="text-[10px] px-3 py-1 rounded-full border border-gray-300 bg-white text-gray-500 tracking-widest">#' + esc(t) + '</span>';
            }).join('');

            // 分享
            var shareUrl = location.href;
            document.getElementById('share-fb').href =
                'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(shareUrl);
            document.getElementById('share-link').onclick = function () {
                navigator.clipboard.writeText(shareUrl).then(function () {
                    var btn = document.getElementById('share-link');
                    var old = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-check text-xs"></i>';
                    setTimeout(function () { btn.innerHTML = old; }, 1500);
                });
            };

            heroEl.classList.remove('hidden');
            mainEl.classList.remove('hidden');
            fallbackEl.classList.add('hidden');

            renderRelated(post);
        }

        function tryRender() {
            var id = currentId();
            var post = id ? NewsStore.getById(id) : null;
            if (post) renderPost(post);
            else {
                heroEl.classList.add('hidden');
                mainEl.classList.add('hidden');
                relatedEl.classList.add('hidden');
                fallbackEl.classList.remove('hidden');
                document.title = '找不到消息｜華梵禮儀 最新消息';
            }
        }

        tryRender();
        window.addEventListener('hashchange', tryRender);
        NewsStore.subscribe(tryRender);
        NewsStore.refreshFromRemote().then(function (ok) { if (ok) tryRender(); });
    })();
    </script>
    <script src="js/hf-news-admin.js"></script>
</body>
</html>
